repos:
  - repo: local
    hooks:
    - id: ruff-format
      name: ruff-format
      entry: ruff
      args: ["format", "--check"]
      language: system
      types: [python]
      stages: [pre-commit]
    - id: ruff-lint
      name: ruff-lint
      entry: ruff
      args: ["check"]
      language: system
      types: [python]
      stages: [pre-commit]
    - id: ty
      name: ty
      entry: uv run ty check
      language: system
      types: [python]
      stages: [pre-commit]
    - id: pytest
      name: pytest
      entry: pytest
      language: system
      stages: [pre-commit]
